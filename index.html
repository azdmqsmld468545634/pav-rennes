<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri Rennes Métropole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #059669;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .item-fade-in { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-amber { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <header class="bg-emerald-700 text-white p-5 shadow-lg sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i class="fas fa-recycle text-2xl"></i>
            <h1 class="text-xl font-black tracking-tight uppercase">Tri Rennes Métropole</h1>
        </div>
        <button onclick="window.location.reload()" class="p-2 hover:bg-emerald-800 rounded-full transition">
            <i class="fas fa-sync-alt"></i>
        </button>
    </header>

    <main class="container mx-auto p-4 max-w-md space-y-6">
        
        <!-- Localisation Bar -->
        <section class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 sm:p-8">
            <h2 class="text-[10px] font-black uppercase tracking-[0.25em] text-slate-400 mb-6 text-center">Départ</h2>
            <div class="flex flex-col gap-3">
                <div class="flex gap-2 h-14">
                    <button onclick="getLocation()" class="bg-emerald-100 text-emerald-700 px-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition shadow-sm whitespace-nowrap">
                        <i class="fas fa-location-arrow"></i>
                        <span class="hidden sm:inline">GPS</span>
                    </button>
                    <div class="relative flex-grow">
                        <input type="text" id="manual-input" placeholder="Ville ou adresse..." class="w-full h-full bg-slate-50 border-none rounded-2xl pl-5 pr-14 focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-semibold shadow-inner">
                        <button onclick="handleManualSearch()" class="absolute right-2 top-2 bottom-2 px-3 bg-emerald-600 text-white rounded-xl shadow-md active:scale-90 transition flex items-center justify-center">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <div id="status-display" class="flex items-center justify-center gap-2 text-[10px] font-black text-emerald-600 mt-1 uppercase">
                    <i class="fas fa-map-marker-alt"></i> <span id="status-text">Prêt pour la recherche</span>
                </div>
            </div>
        </section>

        <!-- Filtres -->
        <section class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-8">
            <h2 class="text-[10px] font-black uppercase tracking-[0.25em] text-slate-400 mb-5 text-center">Filtrer par type</h2>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="setFilter('ve')" id="filter-ve" class="filter-btn p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 border-2 border-emerald-500 bg-emerald-50 shadow-inner">
                    <i class="fas fa-wine-bottle text-xl text-emerald-600"></i>
                    <span class="text-[8px] font-black uppercase tracking-tight">Verre</span>
                </button>
                <button onclick="setFilter('mm')" id="filter-mm" class="filter-btn p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 border-2 border-slate-50 bg-slate-50">
                    <i class="fas fa-box-open text-xl text-yellow-600"></i>
                    <span class="text-[8px] font-black uppercase tracking-tight">Recyclable</span>
                </button>
                <button onclick="setFilter('om')" id="filter-om" class="filter-btn p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 border-2 border-slate-50 bg-slate-50">
                    <i class="fas fa-trash text-xl text-slate-600"></i>
                    <span class="text-[8px] font-black uppercase tracking-tight">Ordures</span>
                </button>
                <button onclick="setFilter('da')" id="filter-da" class="filter-btn p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 border-2 border-slate-50 bg-slate-50">
                    <i class="fas fa-apple-whole text-xl text-orange-700"></i>
                    <span class="text-[8px] font-black uppercase tracking-tight">Bio-déchets</span>
                </button>
                <button onclick="setFilter('decheterie')" id="filter-decheterie" class="filter-btn p-4 rounded-3xl flex flex-col items-center gap-2 transition-all active:scale-95 border-2 border-slate-50 bg-slate-50 col-span-2">
                    <i class="fas fa-warehouse text-xl text-blue-700"></i>
                    <span class="text-[8px] font-black uppercase tracking-tight">Déchèterie / Végétaux</span>
                </button>
            </div>
        </section>

        <!-- Résultats -->
        <div id="loader" class="hidden flex flex-col items-center p-12 space-y-4">
            <div class="loading-spinner"></div>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Recherche en cours...</p>
        </div>
        <div id="results-container" class="space-y-5"></div>

    </main>

    <footer class="p-10 text-center opacity-40">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Rennes Métropole Open Data</p>
    </footer>

    <script>
        let userCoords = null;
        let selectedFilter = 've';
        
        const API_BASE = "https://data.rennesmetropole.fr/api/explore/v2.1/catalog/datasets/";
        const DS_PAV = "points-apport-volontaire";
        const DS_DECH = "decheteries_plateformes_vegetaux";

        function setFilter(type) {
            selectedFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'shadow-inner');
                btn.classList.add('border-slate-50', 'bg-slate-50');
            });
            const active = document.getElementById('filter-' + type);
            active.classList.add('border-emerald-500', 'bg-emerald-50', 'shadow-inner');
            active.classList.remove('border-slate-50', 'bg-slate-50');
            if (userCoords) findNearest();
        }

        function getLocation() {
            const st = document.getElementById('status-text');
            st.innerText = "Accès GPS...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    st.innerText = "Position GPS active";
                    findNearest();
                },
                (err) => { st.innerText = "GPS inactif"; },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        async function handleManualSearch() {
            const input = document.getElementById('manual-input').value.trim();
            const query = input || "Rennes";
            const st = document.getElementById('status-text');
            st.innerText = "Recherche...";

            try {
                // Priorité à l'Ille-et-Vilaine pour éviter les homonymes
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", Ille-et-Vilaine")}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    userCoords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    st.innerText = data[0].display_name.split(',')[0];
                    findNearest();
                } else {
                    st.innerText = "Lieu inconnu";
                }
            } catch (e) { st.innerText = "Erreur service"; }
        }

        async function findNearest() {
            if (!userCoords) return;
            const container = document.getElementById('results-container');
            const loader = document.getElementById('loader');
            container.innerHTML = "";
            loader.classList.remove('hidden');

            try {
                const ds = selectedFilter === 'decheterie' ? DS_DECH : DS_PAV;
                const radius = selectedFilter === 'decheterie' ? "50000" : "20000";
                let where = `within_distance(geo_point_2d, geom'POINT(${userCoords.lng} ${userCoords.lat})', ${radius}m)`;
                if (selectedFilter !== 'decheterie') where += ` AND flux_${selectedFilter}=1`;

                const url = `${API_BASE}${ds}/records?limit=5&where=${encodeURIComponent(where)}&order_by=${encodeURIComponent(`distance(geo_point_2d, geom'POINT(${userCoords.lng} ${userCoords.lat})')`)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                loader.classList.add('hidden');
                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm italic">Aucun point trouvé à proximité.</div>`;
                    return;
                }
                data.results.forEach((r, i) => displayCard(r, i));
            } catch (e) {
                loader.classList.add('hidden');
                container.innerHTML = `<div class="p-4 text-center text-red-500 text-xs font-bold">Erreur de connexion API Rennes.</div>`;
            }
        }

        function checkStatus(str) {
            if (!str || str === "null") return { label: 'HORAIRES ?', color: 'slate' };
            const now = new Date();
            const todayIdx = now.getDay();
            const curMins = now.getHours() * 60 + now.getMinutes();
            const days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
            const short = ['dim', 'lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];
            
            const h = str.toLowerCase().replace(/[\n\r/|;,]+/g, ' ## ');
            const segs = h.split(' ## ');
            let todayText = "";

            for (let s of segs) {
                const t = s.trim();
                if (t.includes(days[todayIdx]) || t.includes(short[todayIdx])) { todayText = t; break; }
                if (t.includes(' au ') || t.includes(' à ') || t.includes('-')) {
                    const words = t.split(/[\s\-auà:]+/);
                    const sD = days.findIndex(d => words.includes(d)) !== -1 ? days.findIndex(d => words.includes(d)) : short.findIndex(d => words.includes(d));
                    let eD = -1;
                    days.forEach((d, i) => { if(t.includes(d)) eD = i; });
                    if(eD === -1) short.forEach((d, i) => { if(t.includes(d)) eD = i; });
                    if (sD !== -1 && eD !== -1) {
                        if (sD <= eD) { if (todayIdx >= sD && todayIdx <= eD) todayText = t; }
                        else { if (todayIdx >= sD || todayIdx <= eD) todayText = t; }
                    }
                }
            }
            if (!todayText) todayText = h;
            if (todayText.includes('fermé')) return { label: 'FERMÉ', color: 'red' };

            const times = todayText.match(/(\d+)h(\d+)?|(\d+):(\d+)/g);
            if (!times || times.length < 2) return { label: 'OUVERT ?', color: 'slate' };

            const parsed = times.map(t => {
                const p = t.replace(':', 'h').split('h');
                return parseInt(p[0]) * 60 + (parseInt(p[1]) || 0);
            });

            let next = null;
            for (let i = 0; i < parsed.length; i += 2) {
                const s = parsed[i], e = parsed[i+1];
                if (curMins >= s && curMins <= e) return { label: 'OUVERT', color: 'emerald' };
                if (curMins < s && (next === null || s < next)) next = s;
            }

            if (next !== null) {
                const diff = next - curMins;
                const h_d = Math.floor(diff / 60), m_d = diff % 60;
                return { label: h_d > 0 ? `OUVRE DANS ${h_d}H${m_d > 0 ? m_d : ''}` : `OUVRE DANS ${m_d} MIN`, color: 'amber' };
            }
            return { label: 'FERMÉ', color: 'red' };
        }

        function displayCard(r, index) {
            const container = document.getElementById('results-container');
            const isDech = selectedFilter === 'decheterie';
            const name = isDech ? r.nom : (r.adresse_complete || r.localisation);
            const address = isDech ? (r.adresse || r.voie || "") : "";
            const city = r.commune || "";
            const lat = r.geo_point_2d.lat, lng = r.geo_point_2d.lon;
            
            const dist = calculateDistance(userCoords.lat, userCoords.lng, lat, lng);
            const hrs = r.horaires_ouverture || r.horaires || "";
            const info = checkStatus(hrs);

            const colors = {
                'red': 'bg-red-50 text-red-700 border-red-100',
                'emerald': 'bg-emerald-50 text-emerald-700 border-emerald-100',
                'amber': 'bg-orange-50 text-orange-700 border-orange-100 pulse-amber',
                'slate': 'bg-slate-50 text-slate-500 border-slate-100'
            };

            const nav = /iPhone|iPad|iPod/i.test(navigator.userAgent) 
                ? `maps://maps.apple.com/?daddr=${lat},${lng}&dirflg=w`
                : `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;

            const card = `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden item-fade-in" style="animation-delay:${index*0.1}s">
                    <div class="p-8">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black uppercase text-slate-300 tracking-[0.2em]">${isDech ? 'Déchèterie' : 'Point de tri'}</span>
                            <span class="text-xs font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">(${dist})</span>
                        </div>
                        <h3 class="text-lg font-black text-slate-800 leading-tight mb-2">
                            ${name} <span class="text-[9px] font-black px-2 py-1 rounded-lg border uppercase ml-1 ${colors[info.color]}">${info.label}</span>
                        </h3>
                        <div class="space-y-0.5 mb-6">
                            ${address ? `<p class="text-xs text-slate-600 font-bold">${address}</p>` : ''}
                            <p class="text-[10px] text-slate-400 font-bold italic uppercase tracking-wider">${city}</p>
                        </div>
                        ${isDech ? `
                        <details class="mb-6 group">
                            <summary class="list-none cursor-pointer flex items-center gap-3 text-[9px] font-black uppercase text-slate-500 bg-slate-50 p-4 rounded-2xl group-open:bg-emerald-50 group-open:text-emerald-700 transition-all">
                                <i class="fas fa-clock"></i> Horaires détaillés
                            </summary>
                            <div class="mt-3 p-4 text-[11px] leading-relaxed text-slate-500 whitespace-pre-line border-l-4 border-emerald-200 ml-4 font-medium">${hrs}</div>
                        </details>` : ''}
                        <button onclick="window.location.href='${nav}'" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-sm flex items-center justify-center gap-3 active:scale-[0.98] transition shadow-2xl shadow-slate-200">
                            <i class="fas fa-location-arrow"></i> ITINÉRAIRE
                        </button>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', card);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return d < 1 ? Math.round(d*1000)+" m" : d.toFixed(1)+" km";
        }
    </script>
</body>
</html>
