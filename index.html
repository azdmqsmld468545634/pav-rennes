<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAV Rennes Métropole - Points les plus proches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #059669;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .item-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-900">

    <!-- Header -->
    <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-recycle"></i> PAV Rennes
            </h1>
            <button onclick="window.location.reload()" class="p-2 hover:bg-emerald-700 rounded-full transition">
                <i class="fas fa-redo-alt"></i>
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow max-w-md">
        
        <!-- Section Localisation -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-5">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Départ</h2>
            
            <div id="location-status" class="mb-4 text-sm font-medium flex items-center gap-2 text-slate-600">
                <i class="fas fa-location-crosshairs text-emerald-500"></i>
                <span id="status-text">Prêt pour la recherche</span>
            </div>

            <div class="flex gap-2">
                <button id="btn-gps" onclick="getLocation()" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl font-bold hover:bg-emerald-200 transition flex items-center gap-2">
                    <i class="fas fa-crosshairs"></i> GPS
                </button>
                <div class="relative flex-grow">
                    <input type="text" id="address-input" placeholder="Adresse à Rennes..." class="w-full bg-slate-100 border-none rounded-xl py-2 pl-3 pr-10 focus:ring-2 focus:ring-emerald-500 outline-none text-sm h-full">
                    <button onclick="geocodeAddress()" class="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-600">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Section Filtres -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-5">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Type de tri</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setFilter('ve')" id="filter-ve" class="filter-btn border-2 border-slate-100 p-3 rounded-2xl flex flex-col items-center gap-2 transition active:scale-95 bg-slate-50">
                    <i class="fas fa-wine-bottle text-emerald-600 text-xl"></i>
                    <span class="text-[10px] font-bold uppercase">Verre</span>
                </button>
                <button onclick="setFilter('mm')" id="filter-mm" class="filter-btn border-2 border-slate-100 p-3 rounded-2xl flex flex-col items-center gap-2 transition active:scale-95 bg-slate-50">
                    <i class="fas fa-box-open text-yellow-600 text-xl"></i>
                    <span class="text-[10px] font-bold uppercase">Recyclable</span>
                </button>
                <button onclick="setFilter('om')" id="filter-om" class="filter-btn border-2 border-slate-100 p-3 rounded-2xl flex flex-col items-center gap-2 transition active:scale-95 bg-slate-50">
                    <i class="fas fa-trash text-slate-600 text-xl"></i>
                    <span class="text-[10px] font-bold uppercase">Ordures</span>
                </button>
                <button onclick="setFilter('da')" id="filter-da" class="filter-btn border-2 border-slate-100 p-3 rounded-2xl flex flex-col items-center gap-2 transition active:scale-95 bg-slate-50">
                    <i class="fas fa-leaf text-orange-700 text-xl"></i>
                    <span class="text-[10px] font-bold uppercase">Bio-déchets</span>
                </button>
            </div>
        </section>

        <!-- Loader -->
        <div id="loader" class="hidden flex flex-col items-center justify-center p-10 text-center">
            <div class="loading-spinner mb-3"></div>
            <p class="text-sm text-slate-500">Recherche des points à proximité...</p>
        </div>

        <!-- Container des résultats -->
        <div id="results-container" class="space-y-4 mb-8">
            <!-- Les cartes seront injectées ici par JS -->
        </div>

    </main>

    <footer class="p-6 text-center text-slate-400 text-[10px] leading-relaxed">
        Source : data.rennesmetropole.fr<br>
        Optimisé pour smartphone
    </footer>

    <script>
        let userCoords = null;
        let selectedFilter = 've';
        
        // URL de base pointant vers le dataset des PAV
        const BASE_API_URL = "https://data.rennesmetropole.fr/api/records/1.0/search/?dataset=points-apport-volontaire";

        window.onload = () => {
            setFilter('ve');
        };

        function setFilter(type) {
            selectedFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('border-emerald-500', 'bg-emerald-50', 'ring-1', 'ring-emerald-500');
            });
            const activeBtn = document.getElementById(`filter-${type}`);
            if (activeBtn) {
                activeBtn.classList.add('border-emerald-500', 'bg-emerald-50', 'ring-1', 'ring-emerald-500');
            }
            
            if (userCoords) findNearest();
        }

        function getLocation() {
            const status = document.getElementById('status-text');
            status.innerText = "Demande d'accès GPS...";
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoords = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    status.innerText = "Position GPS active";
                    findNearest();
                },
                (err) => {
                    status.innerText = "Erreur GPS : " + (err.message || "Accès refusé");
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        async function geocodeAddress() {
            const query = document.getElementById('address-input').value;
            if (!query) return;

            const status = document.getElementById('status-text');
            status.innerText = "Recherche d'adresse...";
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Rennes")}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    userCoords = {
                        lat: parseFloat(data[0].lat),
                        lng: parseFloat(data[0].lon)
                    };
                    status.innerText = "Départ : " + data[0].display_name.split(',')[0];
                    findNearest();
                } else {
                    status.innerText = "Adresse non trouvée";
                }
            } catch (e) {
                status.innerText = "Erreur service d'adresse";
            }
        }

        async function findNearest() {
            if (!userCoords) return;

            const loader = document.getElementById('loader');
            const container = document.getElementById('results-container');
            
            loader.classList.remove('hidden');
            container.innerHTML = ""; // Vider les anciens résultats

            try {
                // On demande les 5 points les plus proches (rows=5) dans un rayon de 20km
                const url = `${BASE_API_URL}&rows=5&refine.flux_${selectedFilter}=1&geofilter.distance=${userCoords.lat},${userCoords.lng},20000`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();

                if (!data.records || data.records.length === 0) {
                    container.innerHTML = `
                        <div class="bg-amber-50 text-amber-800 p-4 rounded-xl text-center text-sm border border-amber-100">
                            Aucun point trouvé pour ce type de déchet à proximité.
                        </div>`;
                    return;
                }

                data.records.forEach((record, index) => {
                    displayResultCard(record, index);
                });

            } catch (error) {
                console.error(error);
                alert("Erreur de connexion aux données.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function displayResultCard(record, index) {
            const container = document.getElementById('results-container');
            const fields = record.fields;
            const addressText = fields.adresse_complete || fields.localisation || "Adresse non précisée";
            const cityText = fields.commune || "Rennes Métropole";
            
            const destLat = fields.geo_point_2d[0];
            const destLng = fields.geo_point_2d[1];
            const d = calculateDistance(userCoords.lat, userCoords.lng, destLat, destLng);
            const distLabel = d < 1 ? Math.round(d * 1000) + " m" : d.toFixed(1) + " km";

            // Construction du lien de navigation
            let navUrl = `https://www.google.com/maps/dir/?api=1&destination=${destLat},${destLng}&travelmode=walking`;
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                navUrl = `maps://maps.apple.com/?daddr=${destLat},${destLng}&dirflg=w`;
            }

            const cardHtml = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden item-fade-in" style="animation-delay: ${index * 0.1}s">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-extrabold uppercase tracking-widest text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">Point n°${index + 1}</span>
                            <span class="text-sm font-bold text-slate-700">${distLabel}</span>
                        </div>
                        <h3 class="text-base font-bold text-slate-800 mb-1 leading-tight">${addressText}</h3>
                        <p class="text-xs text-slate-500 mb-4 flex items-center gap-1">
                            <i class="fas fa-map-marker-alt text-emerald-500"></i> ${cityText}
                        </p>
                        <button onclick="window.location.href='${navUrl}'" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-black transition active:scale-[0.98]">
                            <i class="fas fa-location-arrow"></i>
                            Y ALLER
                        </button>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', cardHtml);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }
    </script>
</body>
</html>
