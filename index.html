<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAV Rennes Métropole - Point le plus proche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-trash-restore"></i> PAV Rennes
            </h1>
            <button onclick="window.location.reload()" class="text-sm bg-green-700 px-3 py-1 rounded">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow max-w-md">
        
        <!-- Localisation Section -->
        <section class="bg-white rounded-xl shadow-md p-5 mb-6">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Ma position</h2>
            
            <div id="location-status" class="mb-4 text-sm text-gray-600 flex items-center gap-2">
                <i class="fas fa-location-arrow text-blue-500"></i>
                <span id="status-text">Recherche de votre position...</span>
            </div>

            <div class="flex gap-2 mb-4">
                <button id="btn-gps" onclick="getLocation()" class="flex-1 bg-blue-500 text-white py-2 rounded-lg font-medium hover:bg-blue-600 transition shadow-sm">
                    <i class="fas fa-gps"></i> GPS
                </button>
                <div class="relative flex-[2]">
                    <input type="text" id="address-input" placeholder="Ou tapez une adresse..." class="w-full border rounded-lg py-2 px-3 focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                    <button onclick="geocodeAddress()" class="absolute right-2 top-2 text-blue-500">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Filtres Section -->
        <section class="bg-white rounded-xl shadow-md p-5 mb-6">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Type de déchet</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setFilter('ve')" id="filter-ve" class="filter-btn border-2 border-gray-200 p-3 rounded-xl flex flex-col items-center gap-2 hover:border-green-500 transition active:scale-95">
                    <i class="fas fa-wine-glass text-green-600 text-xl"></i>
                    <span class="text-xs font-bold uppercase">Verre</span>
                </button>
                <button onclick="setFilter('mm')" id="filter-mm" class="filter-btn border-2 border-gray-200 p-3 rounded-xl flex flex-col items-center gap-2 hover:border-yellow-500 transition active:scale-95">
                    <i class="fas fa-box-open text-yellow-600 text-xl"></i>
                    <span class="text-xs font-bold uppercase">Recyclable</span>
                </button>
                <button onclick="setFilter('om')" id="filter-om" class="filter-btn border-2 border-gray-200 p-3 rounded-xl flex flex-col items-center gap-2 hover:border-gray-500 transition active:scale-95">
                    <i class="fas fa-dumpster text-gray-600 text-xl"></i>
                    <span class="text-xs font-bold uppercase">Ordures</span>
                </button>
                <button onclick="setFilter('da')" id="filter-da" class="filter-btn border-2 border-gray-200 p-3 rounded-xl flex flex-col items-center gap-2 hover:border-brown-500 transition active:scale-95">
                    <i class="fas fa-apple-alt text-orange-800 text-xl"></i>
                    <span class="text-xs font-bold uppercase">Bio-déchets</span>
                </button>
            </div>
        </section>

        <!-- Result Section -->
        <div id="loader" class="hidden flex justify-center p-10">
            <div class="loading-spinner"></div>
        </div>

        <section id="result-card" class="hidden animate-bounce-in">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border-t-4 border-green-500">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded">LE PLUS PROCHE</span>
                        <span id="result-distance" class="text-xl font-bold text-blue-600">-- m</span>
                    </div>
                    <h3 id="result-address" class="text-lg font-semibold text-gray-800 mb-2 leading-tight">--</h3>
                    <p id="result-details" class="text-sm text-gray-500 mb-6">Situé à Rennes Métropole</p>
                    
                    <button id="btn-navigate" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-3 shadow-lg hover:bg-green-700 transition active:scale-95">
                        <i class="fas fa-directions text-2xl"></i>
                        ME GUIDER
                    </button>
                </div>
            </div>
        </section>

    </main>

    <footer class="p-4 text-center text-gray-400 text-xs">
        Données : Open Data Rennes Métropole<br>
        Application optimisée pour smartphone.
    </footer>

    <script>
        let userCoords = null;
        let selectedFilter = 've'; // Par défaut le verre
        const API_URL = "https://data.rennesmetropole.fr/api/records/1.0/search/?dataset=points-apport-volontaire&rows=1000";

        // Initialisation
        window.onload = () => {
            setFilter('ve');
            getLocation();
        };

        function setFilter(type) {
            selectedFilter = type;
            // UI Update
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('border-green-500', 'bg-green-50', 'ring-2', 'ring-green-500');
            });
            const activeBtn = document.getElementById(`filter-${type}`);
            activeBtn.classList.add('border-green-500', 'bg-green-50', 'ring-2', 'ring-green-500');
            
            if (userCoords) findNearest();
        }

        function getLocation() {
            const status = document.getElementById('status-text');
            if (!navigator.geolocation) {
                status.innerText = "La géolocalisation n'est pas supportée.";
                return;
            }

            status.innerText = "Localisation en cours...";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoords = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    status.innerText = "Position trouvée ! (" + userCoords.lat.toFixed(4) + ")";
                    findNearest();
                },
                () => {
                    status.innerText = "Accès GPS refusé. Saisissez une adresse.";
                }
            );
        }

        async function geocodeAddress() {
            const query = document.getElementById('address-input').value;
            if (!query) return;

            document.getElementById('status-text').innerText = "Recherche de l'adresse...";
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Rennes")}`);
                const data = await response.json();
                if (data.length > 0) {
                    userCoords = {
                        lat: parseFloat(data[0].lat),
                        lng: parseFloat(data[0].lon)
                    };
                    document.getElementById('status-text').innerText = "Adresse identifiée.";
                    findNearest();
                } else {
                    document.getElementById('status-text').innerText = "Adresse introuvable.";
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function findNearest() {
            if (!userCoords) return;

            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('result-card');
            
            loader.classList.remove('hidden');
            resultCard.classList.add('hidden');

            try {
                // Construction du filtre API selon le type de déchet
                // flux_om (ordures), flux_ve (verre), flux_mm (multi-matériaux/recyclable), flux_da (déchets alimentaires)
                const filterQuery = `&refine.flux_${selectedFilter}=1`;
                const response = await fetch(API_URL + filterQuery);
                const data = await response.json();

                if (!data.records || data.records.length === 0) {
                    alert("Aucun point trouvé pour ce type de déchet.");
                    loader.classList.add('hidden');
                    return;
                }

                let nearest = null;
                let minDistance = Infinity;

                data.records.forEach(record => {
                    const lat = record.geometry.coordinates[1];
                    const lng = record.geometry.coordinates[0];
                    const dist = calculateDistance(userCoords.lat, userCoords.lng, lat, lng);
                    
                    if (dist < minDistance) {
                        minDistance = dist;
                        nearest = record;
                    }
                });

                if (nearest) {
                    displayResult(nearest, minDistance);
                }

            } catch (error) {
                console.error(error);
                alert("Erreur lors de la récupération des données.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function displayResult(record, distance) {
            const card = document.getElementById('result-card');
            const addr = document.getElementById('result-address');
            const dist = document.getElementById('result-distance');
            const det = document.getElementById('result-details');
            const btnNav = document.getElementById('btn-navigate');

            const addressText = record.fields.adresse_complete || record.fields.localisation || "Adresse inconnue";
            addr.innerText = addressText;
            
            dist.innerText = distance < 1 ? Math.round(distance * 1000) + " m" : distance.toFixed(2) + " km";
            
            det.innerText = `Quartier : ${record.fields.quartier || 'Non précisé'}`;

            const lat = record.geometry.coordinates[1];
            const lng = record.geometry.coordinates[0];

            btnNav.onclick = () => {
                // Intent universel pour navigation (Google Maps, Apple Maps ou Waze)
                const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;
                window.location.href = url;
            };

            card.classList.remove('hidden');
            card.scrollIntoView({ behavior: 'smooth' });
        }

        // Formule de Haversine pour calculer la distance entre deux points GPS
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Rayon de la terre en km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }
    </script>
</body>
</html>
